services:
  mcp-file-service:
    image: ${MCP_WORKBENCH_FILE_SERVICE_LOCAL_BASE_IMAGE:-openagents-mcp-workbench-mcp-file-service-local-base}
    build: null
    working_dir: /app
    command:
      - /bin/sh
      - -lc
      - |
        ORIGINAL_PYTHONPATH="$${PYTHONPATH:-}"
        export PYTHONPATH="/app:/app/.venv/lib/python3.12/site-packages"
        if [ -n "$$ORIGINAL_PYTHONPATH" ]; then
          export PYTHONPATH="$$PYTHONPATH:$$ORIGINAL_PYTHONPATH"
        fi
        python -m uvicorn app.main:app --host 0.0.0.0 --port 8090
    volumes:
      - ./mcp-file-service:/app
      - mcp_workbench_data:/data

  mcp-workbench-ui:
    image: node:22-alpine
    build: null
    command:
      - /bin/sh
      - -lc
      - |
        ./node_modules/.bin/vite --host 0.0.0.0 --port 8084
    working_dir: /app/frontend/demo
    volumes:
      - ./:/app/frontend/demo

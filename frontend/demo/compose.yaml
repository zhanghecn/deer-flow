name: openagents-mcp-workbench

services:
  mcp-file-service:
    # Keep the MCP service as the only runtime backend. Its writable state is a
    # visible project bind mount, not a Docker named volume hidden under /var/lib.
    image: ${MCP_WORKBENCH_FILE_SERVICE_IMAGE:-openagents-mcp-workbench-mcp-file-service}
    build:
      context: .
      dockerfile: mcp-file-service/Dockerfile
      args:
        PIP_INDEX_URL: ${DEMO_PYTHON_INDEX_URL:-https://mirrors.aliyun.com/pypi/simple/}
        APT_DEBIAN_MIRROR: ${DEMO_APT_DEBIAN_MIRROR:-http://mirrors.aliyun.com/debian}
        APT_SECURITY_MIRROR: ${DEMO_APT_SECURITY_MIRROR:-http://mirrors.aliyun.com/debian-security}
    environment:
      MCP_WORKBENCH_HOST: 0.0.0.0
      MCP_WORKBENCH_PORT: 8090
      MCP_WORKBENCH_PUBLIC_BASE_URL: ${MCP_WORKBENCH_PUBLIC_BASE_URL:-http://127.0.0.1:8084}
      MCP_WORKBENCH_DATA_DIR: /data/files
      MCP_WORKBENCH_ALLOWED_ORIGINS: ${MCP_WORKBENCH_ALLOWED_ORIGINS:-*}
    volumes:
      - ./deploy/data:/data
    restart: unless-stopped

  mcp-workbench:
    # One container owns the browser surface: nginx serves the built frontend
    # and reverse proxies all MCP/API traffic to the internal MCP service.
    image: ${MCP_WORKBENCH_IMAGE:-openagents-mcp-workbench}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NPM_REGISTRY: ${DEMO_NPM_REGISTRY:-https://registry.npmmirror.com}
        VITE_DEMO_PUBLIC_API_BASE_URL: ${VITE_DEMO_PUBLIC_API_BASE_URL:-}
        VITE_DEMO_PUBLIC_API_KEY: ${VITE_DEMO_PUBLIC_API_KEY:-}
        VITE_DEMO_DEFAULT_AGENT_NAME: ${VITE_DEMO_DEFAULT_AGENT_NAME:-}
        VITE_DEMO_HTTP_AGENT_NAME: ${VITE_DEMO_HTTP_AGENT_NAME:-}
        VITE_DEMO_HTTP_API_KEY: ${VITE_DEMO_HTTP_API_KEY:-}
        VITE_DEMO_WORKBENCH_BASE_URL: ${VITE_DEMO_WORKBENCH_BASE_URL:-http://127.0.0.1:8084}
        VITE_DEMO_MESSAGE_TRACE_DISPLAY_MODE: ${VITE_DEMO_MESSAGE_TRACE_DISPLAY_MODE:-debug}
    depends_on:
      - mcp-file-service
    ports:
      - "8084:8084"
    restart: unless-stopped

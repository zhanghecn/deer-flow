map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

server {
  listen 8084;
  server_name _;
  client_max_body_size 200m;

  # Docker may recreate the MCP container on rebuild. Resolve the service name
  # dynamically so nginx does not pin a stale container IP.
  resolver 127.0.0.11 ipv6=off valid=10s;
  set $mcp_file_service http://mcp-file-service:8090;

  root /usr/share/nginx/html;
  index index.html;

  location /api/ {
    proxy_pass $mcp_file_service;
    proxy_http_version 1.1;
    proxy_set_header Host $host:$server_port;
    proxy_set_header X-Forwarded-Host $host:$server_port;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location /mcp-http/ {
    proxy_pass $mcp_file_service;
    proxy_http_version 1.1;
    proxy_set_header Host $host:$server_port;
    proxy_set_header X-Forwarded-Host $host:$server_port;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_buffering off;
  }

  # Keep the document-only agent endpoint on the same public port as the UI.
  location /mcp-http-agent/ {
    proxy_pass $mcp_file_service;
    proxy_http_version 1.1;
    proxy_set_header Host $host:$server_port;
    proxy_set_header X-Forwarded-Host $host:$server_port;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_buffering off;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}

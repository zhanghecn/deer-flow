map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

server {
  listen 8084;
  server_name _;
  client_max_body_size 200m;

  # Docker recreates the UI and MCP containers during rebuilds, so nginx must
  # re-resolve service names instead of pinning the first container IP forever.
  resolver 127.0.0.11 ipv6=off valid=10s;
  set $mcp_file_service http://mcp-file-service:8090;
  set $mcp_workbench_ui http://mcp-workbench-ui:8084;

  # Keep all browser-visible traffic on one public port while the file service
  # and Vite dev server stay private on the compose network.
  location /api/ {
    proxy_pass $mcp_file_service;
    proxy_http_version 1.1;
    proxy_set_header Host $host:$server_port;
    proxy_set_header X-Forwarded-Host $host:$server_port;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location /mcp-http/ {
    proxy_pass $mcp_file_service;
    proxy_http_version 1.1;
    proxy_set_header Host $host:$server_port;
    proxy_set_header X-Forwarded-Host $host:$server_port;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_buffering off;
  }

  location / {
    proxy_pass $mcp_workbench_ui;
    proxy_http_version 1.1;
    proxy_set_header Host $host:$server_port;
    proxy_set_header X-Forwarded-Host $host:$server_port;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }
}

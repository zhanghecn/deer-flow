<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenAgents</title>
    <script>
      // Pre-bootstrap dedicated page titles that should not flash the generic
      // app name during hard reload before the React router hydrates.
      (function () {
        var localeMatch = document.cookie.match(/(?:^|; )locale=([^;]+)/);
        var locale = localeMatch ? decodeURIComponent(localeMatch[1]) : "en-US";
        if (window.location.pathname === "/workspace/keys") {
          document.title =
            (locale === "zh-CN" ? "API Key" : "API keys") + " - OpenAgents";
        }
      })();
    </script>
    <meta name="description" content="A LangChain-based framework for building super agents." />
    <link rel="icon" href="/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

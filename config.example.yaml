# OpenAgents runtime config (DB-first minimal template)
#
# Important:
# 1) Models and agents are managed in PostgreSQL (`models`, `agents` tables).
#    Do NOT maintain model definitions in this file for normal runtime.
# 2) Runtime DB credentials are provided via environment variable:
#    DATABASE_URI
# 3) LangGraph persistence/checkpointer is configured via env:
#    DATABASE_URI, LANGGRAPH_CHECKPOINTER (optional), LANGGRAPH_HTTP

# Sandbox provider
sandbox:
  use: src.sandbox.local:LocalSandboxProvider

# Tool registry (still file-based)
tool_groups:
  - name: web
  - name: file:read
  - name: file:write
  - name: bash

tools:
  - name: web_search
    group: web
    use: src.community.tavily.tools:web_search_tool
    max_results: 5

  - name: web_fetch
    group: web
    use: src.community.jina_ai.tools:web_fetch_tool
    timeout: 10

  - name: image_search
    group: web
    use: src.community.image_search.tools:image_search_tool
    max_results: 5

  - name: ls
    group: file:read
    use: src.sandbox.tools:ls_tool

  - name: read_file
    group: file:read
    use: src.sandbox.tools:read_file_tool

  - name: write_file
    group: file:write
    use: src.sandbox.tools:write_file_tool

  - name: str_replace
    group: file:write
    use: src.sandbox.tools:str_replace_tool

  - name: bash
    group: bash
    use: src.sandbox.tools:bash_tool

# Skills mount config
skills:
  container_path: /mnt/skills

# Thread title generation (optional)
title:
  enabled: true
  max_words: 6
  max_chars: 60
  model_name: null

# Memory config
# If enabled=true, memory.model_name must be a valid model in DB.
memory:
  enabled: false
  storage_path: memory.json
  debounce_seconds: 30
  model_name: null
  max_facts: 100
  fact_confidence_threshold: 0.7
  injection_enabled: true
  max_injection_tokens: 2000

# OpenAgents runtime config
#
# Usage:
# - Local or embedded runtime: define at least one model in `models`.
# - Cloud / gateway runtime: models can be injected per request or loaded from
#   PostgreSQL, so `models` can be left empty if your deployment does that.
# - Runtime DB access and checkpoint persistence use the `DATABASE_URI`
#   environment variable.

# Optional for local/dev. Keep this list empty if your runtime injects models.
models: []
# models:
#   - name: gpt-4o
#     display_name: GPT-4o
#     use: langchain_openai:ChatOpenAI
#     model: gpt-4o
#     api_key: $OPENAI_API_KEY
#     # base_url: $OPENAI_BASE_URL
#     max_tokens: 16384
#     supports_thinking: false
#     supports_vision: true

sandbox:
  use: src.sandbox.local:LocalSandboxProvider

# Filesystem tools are provided by deepagents' FilesystemMiddleware and do not
# need to be declared here. Keep this registry for tools loaded from config.
tool_groups:
  - name: web

tools:
  - name: web_search
    group: web
    use: src.community.opencode_web.tools:web_search_tool
    num_results: 8
    search_type: auto
    livecrawl: fallback
    timeout: 25

  - name: web_fetch
    group: web
    use: src.community.opencode_web.tools:web_fetch_tool
    timeout: 30

  - name: image_search
    group: web
    use: src.community.image_search.tools:image_search_tool
    max_results: 5

skills:
  container_path: /mnt/skills

title:
  enabled: true
  max_words: 6
  max_chars: 60
  model_name: null

summarization:
  enabled: true
  model_name: null
  trigger:
    - type: tokens
      value: 15564
  keep:
    type: messages
    value: 10
  trim_tokens_to_summarize: 15564
  summary_prompt: null

# Memory is configured per agent, not in this root config file.

# Gateway configuration

server:
  port: 8001
  host: 0.0.0.0

database:
  uri: $DATABASE_URI

jwt:
  secret: $JWT_SECRET
  expire_hour: 72

storage:
  base_dir: .openagents

logging:
  level: debug
  access_log: true
  # Enable detailed proxy logs for troubleshooting 502/timeout/upstream issues.
  proxy_debug: true
  # Only enable in local debugging; may expose sensitive headers.
  proxy_log_headers: false

upstream:
  langgraph_url: http://localhost:2024

onlyoffice:
  server_url: http://localhost:8082
  internal_server_url: http://localhost:8082
  public_app_url: http://host.docker.internal:8001

# Declarative proxy routes
# Add new upstream services here — no code changes needed.
# Supports: HTTP, SSE/streaming, WebSocket (auto-detected via Upgrade header)
proxy:
  routes:
    - prefix: /api/langgraph
      upstream: http://localhost:2024
      strip_prefix: true
      auth: jwt

# Note:
# LangGraph runtime payload is forwarded as-is.
# Gateway only injects authenticated identity and thread scope:
# - headers: x-user-id, x-thread-id
# - JSON body context.user_id/context.thread_id for run-compatible payloads
# It does not resolve models or query DB.

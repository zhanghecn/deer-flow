name: Publish Demo Images

on:
  push:
    branches:
      - main
    paths:
      - frontend/demo/**
      - .github/workflows/publish-demo-images.yml
  workflow_dispatch:
    inputs:
      push:
        description: Push the built images to GHCR
        required: false
        default: true
        type: boolean
      latest:
        description: Publish the latest tag when running on the default branch
        required: false
        default: true
        type: boolean

concurrency:
  group: publish-demo-images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-demo-images:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: mcp-file-service
            dockerfile: frontend/demo/mcp-file-service/Dockerfile
            image_name: deer-flow-demo-mcp-file-service
          - service: mcp-workbench-ui
            dockerfile: frontend/demo/Dockerfile
            image_name: deer-flow-demo-mcp-workbench-ui

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: ${{ github.event_name == 'push' || inputs.push }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image_name }}
          tags: |
            type=sha
            type=ref,event=branch
            # Keep `latest` reserved for default-branch builds so deployment
            # targets can opt into one stable tag without branch ambiguity.
            type=raw,value=latest,enable=${{ github.ref_name == github.event.repository.default_branch && (github.event_name == 'push' || inputs.latest) }}

      - name: Build and optionally push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name == 'push' || inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max
          provenance: false

name: openagents-support-demo

services:
  # Dedicated HTTP MCP fixture for customer-support testing.
  # Keep it out of the main prod compose so the simulation lane stays explicit:
  # operators choose when to expose the external-style MCP server on :8090.
  customer-cases-mcp-http:
    build:
      context: ..
      dockerfile: backend/agents/Dockerfile
    working_dir: /app/backend/agents
    command: ["python", "scripts/mock_customer_cases_mcp.py", "http"]
    environment:
      CUSTOMER_CASES_MCP_TRANSPORT: http
      CUSTOMER_CASES_MCP_HOST: 0.0.0.0
      CUSTOMER_CASES_MCP_PORT: 8000
      CUSTOMER_CASES_ROOT: /openagents-home/runtime/customer-cases
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONPATH: /app/backend/agents
    ports:
      - "8090:8000"
    volumes:
      - ../backend/agents:/app/backend/agents:ro
      - ../backend/deepagents:/app/backend/deepagents:ro
      - ../.env:/app/.env:ro
      - ../.openagents:/openagents-home
    networks:
      - openagents
    restart: unless-stopped

  # Standalone React + Tailwind customer demo that behaves like an external
  # integrator app instead of another route inside the main workspace UI.
  support-sdk-demo:
    build:
      context: ..
      dockerfile: frontend/demo/Dockerfile
    env_file:
      - ../frontend/demo/.env.local
    ports:
      - "8084:8084"
    networks:
      - openagents
    restart: unless-stopped

networks:
  # Join the already-running prod stack so the standalone demo reaches the same
  # 8083 gateway and the HTTP MCP fixture stays routable by service name.
  openagents:
    external: true
    name: openagents-prod_openagents

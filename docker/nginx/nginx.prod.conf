events {
    worker_connections 1024;
}

pid /tmp/nginx.pid;

http {
    # 兼容 WebSocket / SSE 升级头：
    # - 有 Upgrade 时走 upgrade
    # - 普通 HTTP 请求保持空连接头，避免干扰流式响应
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' '';
    }

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 100M;

    access_log /dev/stdout;
    error_log /dev/stderr;

    # 所有 API 最终都回到 gateway。
    # 这里不需要单独给 langgraph、onlyoffice 再开前端可见路由：
    # - langgraph 由 gateway 统一代理到 /api/langgraph/*
    # - onlyoffice 由 gateway 返回外部 documentServerUrl，浏览器直接访问 8082
    upstream gateway {
        server gateway:8001;
    }

    # 用户前台站点：
    # - 前端真实路由是 BrowserRouter 根路径模式
    # - API 真实访问方式是同源 /api/*
    # 所以这里用 80 端口单独托管，并把所有 SPA 路由回退到 /index.html。
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        root /usr/share/nginx/html/app;
        index index.html;

        # 已核对 frontend/app：
        # - 登录、模型、技能、线程、知识库、上传、artifacts、office-config
        #   全部走 /api/*
        # - /api/langgraph/* 也是先到 gateway，再由 gateway 转给 langgraph
        location /api/ {
            proxy_pass http://gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_buffering off;
            proxy_cache off;
            proxy_set_header X-Accel-Buffering no;
            proxy_connect_timeout 600s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
            proxy_request_buffering off;
            chunked_transfer_encoding on;
        }

        # /open/* 不是普通工作台主流量，但导出 demo / Open API / 流式接口会用到。
        location /open/ {
            proxy_pass http://gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_buffering off;
            proxy_cache off;
            proxy_set_header X-Accel-Buffering no;
            proxy_connect_timeout 600s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
            chunked_transfer_encoding on;
        }

        location = /health {
            proxy_pass http://gateway/health;
        }

        # SPA 回退：
        # 用户前台真实页面路由例如 /login、/workspace/... 都不是物理文件，
        # 所以必须回退到 index.html 交给前端路由继续处理。
        location / {
            try_files $uri $uri/ /index.html;
        }
    }

    # 管理后台站点：
    # - 后台前端使用 createBrowserRouter，路由同样挂在根路径
    # - 没有 basename /admin 子路径部署能力
    # 所以正式环境最简单稳定的做法就是独立 8081 端口，而不是 /admin/ 子路径。
    server {
        listen 8081;
        listen [::]:8081;
        server_name _;

        root /usr/share/nginx/html/admin;
        index index.html;

        # 已核对 frontend/admin：
        # - 后台登录、用户、模型、agents、threads、observability
        #   统一走 window.location.origin 下的 /api/*
        # - 因为后台本身跑在 8081，所以这里必须在 8081 站点内把 /api/* 转给 gateway
        location /api/ {
            proxy_pass http://gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_buffering off;
            proxy_cache off;
            proxy_set_header X-Accel-Buffering no;
            proxy_connect_timeout 600s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
            proxy_request_buffering off;
            chunked_transfer_encoding on;
        }

        # 后台也可能触发 /open/* 相关操作，例如发布后 demo / Open API 链接场景。
        location /open/ {
            proxy_pass http://gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_buffering off;
            proxy_cache off;
            proxy_set_header X-Accel-Buffering no;
            proxy_connect_timeout 600s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
            chunked_transfer_encoding on;
        }

        location = /health {
            proxy_pass http://gateway/health;
        }

        # 后台页面路由回退到 index.html。
        # 例如 /dashboard、/agents、/models、/threads 都靠前端路由处理。
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}

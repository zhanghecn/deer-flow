events {
    worker_connections 1024;
}

pid /tmp/nginx.pid;

http {
    # 不引入 mime.types 的话，JS/CSS 等静态资源会退回错误的 MIME，
    # 浏览器会把 ESM 脚本当成 text/plain 拒绝执行，最终直接白屏。
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 兼容 WebSocket / SSE 升级头：
    # - 有 Upgrade 时走 upgrade
    # - 普通 HTTP 请求保持空连接头，避免干扰流式响应
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' '';
    }

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 100M;

    access_log /dev/stdout;
    error_log /dev/stderr;

    # 所有 API 最终都回到 gateway。
    # langgraph 继续由 gateway 统一代理到 /api/langgraph/*。
    upstream gateway {
        server gateway:8001;
    }

    # ONLYOFFICE 也统一走同源 /onlyoffice/*，避免浏览器直接依赖宿主机
    # 8082 之类的绝对地址；这样生产环境只需要暴露 nginx 自己的端口。
    upstream onlyoffice {
        server onlyoffice:80;
    }

    # 用户前台站点：
    # - 前端真实路由是 BrowserRouter 根路径模式
    # - API 真实访问方式是同源 /api/*
    # 所以这里用容器内 80 端口托管，并把所有 SPA 路由回退到 /index.html。
    # 宿主机通过 compose 映射成 8083:80。
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        root /usr/share/nginx/html/app;
        index index.html;

        # SPA 入口 HTML 必须始终回源校验，避免发布后浏览器继续持有旧
        # index.html 并加载已经过期的 bundle，进而发出废弃接口请求。
        location = /index.html {
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
            expires -1;
        }

        # Vite 产物文件名自带内容哈希，适合长期缓存；让浏览器缓存静态资源，
        # 同时把入口 HTML 的更新检测留给上面的 no-store 策略。
        location /assets/ {
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            try_files $uri =404;
        }

        # 已核对 frontend/app：
        # - 登录、模型、技能、线程、知识库、上传、artifacts、office-config
        #   全部走 /api/*
        # - /api/langgraph/* 也是先到 gateway，再由 gateway 转给 langgraph
        location /api/ {
            proxy_pass http://gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_buffering off;
            proxy_cache off;
            proxy_set_header X-Accel-Buffering no;
            proxy_connect_timeout 600s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
            proxy_request_buffering off;
            chunked_transfer_encoding on;
        }

        # /open/* 不是普通工作台主流量，但导出 demo / Open API / 流式接口会用到。
        location /open/ {
            proxy_pass http://gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_buffering off;
            proxy_cache off;
            proxy_set_header X-Accel-Buffering no;
            proxy_connect_timeout 600s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
            chunked_transfer_encoding on;
        }

        location /sandbox-ide/ {
            proxy_pass http://gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_buffering off;
            proxy_cache off;
            proxy_set_header X-Accel-Buffering no;
            proxy_connect_timeout 600s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
            proxy_request_buffering off;
        }

        # ONLYOFFICE 以子路径形式暴露给浏览器。
        # 这里显式补 X-Forwarded-Host=/onlyoffice 前缀，让 Document Server
        # 在被反代到子路径时仍能生成正确的静态资源和 websocket 地址。
        location /onlyoffice/ {
            proxy_pass http://onlyoffice/;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Host $http_host/onlyoffice;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_connect_timeout 600s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
            proxy_request_buffering off;
            proxy_buffering off;
        }

        location = /health {
            proxy_pass http://gateway/health;
        }

        # SPA 回退：
        # 用户前台真实页面路由例如 /login、/workspace/... 都不是物理文件，
        # 所以必须回退到 index.html 交给前端路由继续处理。
        location / {
            try_files $uri $uri/ /index.html;
        }
    }

    # 管理后台站点：
    # - 后台前端使用 createBrowserRouter，路由同样挂在根路径
    # - 没有 basename /admin 子路径部署能力
    # 所以正式环境最简单稳定的做法就是独立 8081 端口，而不是 /admin/ 子路径。
    server {
        listen 8081;
        listen [::]:8081;
        server_name _;

        root /usr/share/nginx/html/admin;
        index index.html;

        # 后台入口同样不能缓存旧 HTML；否则发布后管理台也可能继续引用旧
        # bundle，出现“代码已更新但浏览器还在跑旧前端”的割裂状态。
        location = /index.html {
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
            expires -1;
        }

        location /assets/ {
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            try_files $uri =404;
        }

        # 已核对 frontend/admin：
        # - 后台登录、用户、模型、agents、threads、observability
        #   统一走 window.location.origin 下的 /api/*
        # - 因为后台本身跑在 8081，所以这里必须在 8081 站点内把 /api/* 转给 gateway
        location /api/ {
            proxy_pass http://gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_buffering off;
            proxy_cache off;
            proxy_set_header X-Accel-Buffering no;
            proxy_connect_timeout 600s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
            proxy_request_buffering off;
            chunked_transfer_encoding on;
        }

        # 后台也可能触发 /open/* 相关操作，例如发布后 demo / Open API 链接场景。
        location /open/ {
            proxy_pass http://gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_buffering off;
            proxy_cache off;
            proxy_set_header X-Accel-Buffering no;
            proxy_connect_timeout 600s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
            chunked_transfer_encoding on;
        }

        location /sandbox-ide/ {
            proxy_pass http://gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_buffering off;
            proxy_cache off;
            proxy_set_header X-Accel-Buffering no;
            proxy_connect_timeout 600s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
            proxy_request_buffering off;
        }

        location /onlyoffice/ {
            proxy_pass http://onlyoffice/;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Host $http_host/onlyoffice;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_connect_timeout 600s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
            proxy_request_buffering off;
            proxy_buffering off;
        }

        location = /health {
            proxy_pass http://gateway/health;
        }

        # 后台页面路由回退到 index.html。
        # 例如 /dashboard、/agents、/models、/threads 都靠前端路由处理。
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}

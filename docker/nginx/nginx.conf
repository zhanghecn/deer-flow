events {
    worker_connections 1024;
}
pid /tmp/nginx.pid;
http {
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 100M;

    access_log /dev/stdout;
    error_log /dev/stderr;

    # Upstream servers (Docker container names)
    upstream gateway {
        server gateway:8001;
    }

    upstream frontend {
        server frontend:3000;
    }

    server {
        listen 2026;
        listen [::]:2026;
        server_name _;

        # ── CORS (centralized) ──────────────────────────────────────
        proxy_hide_header 'Access-Control-Allow-Origin';
        proxy_hide_header 'Access-Control-Allow-Methods';
        proxy_hide_header 'Access-Control-Allow-Headers';
        proxy_hide_header 'Access-Control-Allow-Credentials';

        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' '*' always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # ── Common proxy settings ───────────────────────────────────
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ── All /api/* and /open/* → Go Gateway ─────────────────────
        # Go Gateway handles: auth, agents, skills, models, memory,
        # mcp, uploads, artifacts, and LangGraph proxy with user_id injection.
        location /api/ {
            proxy_pass http://gateway;

            # SSE/Streaming support (for /api/langgraph/*)
            proxy_buffering off;
            proxy_cache off;
            proxy_set_header X-Accel-Buffering no;
            proxy_set_header Connection '';

            # Long-running request timeouts
            proxy_connect_timeout 600s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
            chunked_transfer_encoding on;

            # Large file upload support
            proxy_request_buffering off;
        }

        location /open/ {
            proxy_pass http://gateway;

            proxy_buffering off;
            proxy_cache off;
            proxy_set_header X-Accel-Buffering no;

            proxy_connect_timeout 600s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
            chunked_transfer_encoding on;
        }

        location /sandbox-ide/ {
            proxy_pass http://gateway;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_buffering off;
            proxy_cache off;
            proxy_set_header X-Accel-Buffering no;
            proxy_connect_timeout 600s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
        }

        # ── Health check ────────────────────────────────────────────
        location /health {
            proxy_pass http://gateway;
        }

        # ── Frontend (everything else) ──────────────────────────────
        location / {
            proxy_pass http://frontend;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_cache_bypass $http_upgrade;

            proxy_connect_timeout 600s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
        }
    }
}

name: openagents

x-openagents-env-file: &openagents_env_file
  - ${OPENAGENTS_ENV_FILE:-../.env}

x-json-logging: &json_logging
  # Keep local dev logs on stdout/stderr so operators can inspect every service
  # with `docker compose logs` while Docker handles rotation.
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-host-docker-internal: &host_docker_internal
  # Containers may still need to reach host-managed services such as Postgres
  # or MinIO when the shared repo `.env` points at host.docker.internal.
  - "host.docker.internal:host-gateway"

x-repo-mount: &repo_mount
  # The dev stack intentionally bind-mounts the whole repository read-write so
  # local edits appear in the containers immediately without rebuilds.
  type: bind
  source: ..
  target: /workspace

x-openagents-home-mount: &openagents_home_mount
  # Runtime state plus dependency caches live under OPENAGENTS_DOCKER_HOST_HOME
  # so dev and prod share the same movable deploy/data layout by default.
  type: bind
  source: ${OPENAGENTS_DOCKER_HOST_HOME:-../deploy/data/openagents}
  target: /openagents-home

services:
  sandbox-aio:
    build:
      context: .
      dockerfile: sandbox-aio/Dockerfile
      args:
        BASE_IMAGE: enterprise-public-cn-beijing.cr.volces.com/vefaas-public/all-in-one-sandbox:latest
    image: openagents-sandbox-aio:dev
    env_file: *openagents_env_file
    ports:
      - "${OPENAGENTS_SANDBOX_PORT:-18080}:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/v1/sandbox"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 20s
    security_opt:
      - seccomp=unconfined
      - apparmor=unconfined
      - systempaths=unconfined
    volumes:
      - *openagents_home_mount
      - type: bind
        source: ${OPENAGENTS_DOCKER_HOST_HOME:-../deploy/data/openagents}
        # The sandbox runtime contract expects the shared OPENAGENTS_HOME tree
        # to be visible inside the sandbox service at `/openagents` so
        # `/mnt/user-data/...` can rewrite into `/openagents/threads/...`.
        target: /openagents
    logging: *json_logging
    restart: unless-stopped

  onlyoffice:
    build:
      context: .
      dockerfile: onlyoffice/Dockerfile
    image: openagents-onlyoffice:9.3.1-cjk
    env_file: *openagents_env_file
    ports:
      # This image serves Document Server on 8000 inside the container.
      - "${OPENAGENTS_ONLYOFFICE_PORT:-8082}:8000"
    entrypoint:
      - /bin/bash
      - -lc
      - export JWT_SECRET="$${ONLYOFFICE_JWT_SECRET:-$${JWT_SECRET}}"; exec /app/ds/run-document-server.sh
    environment:
      JWT_ENABLED: "true"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging: *json_logging
    restart: unless-stopped

  langgraph:
    build:
      context: ..
      dockerfile: backend/agents/Dockerfile
    working_dir: /workspace/backend/agents
    command:
      - /bin/sh
      - -lc
      - |
        mkdir -p /openagents-home/dev-cache/uv-cache
        mkdir -p /openagents-home/dev-cache/agents-venv
        # Seed the persisted venv from the image's prebuilt environment so the
        # first dev boot reuses baked dependencies instead of resolving the
        # entire Python graph from scratch into an empty bind mount.
        if [ ! -x /openagents-home/dev-cache/agents-venv/bin/python ]; then
          cp -a /opt/venv/. /openagents-home/dev-cache/agents-venv/
        fi
        export UV_CACHE_DIR=/openagents-home/dev-cache/uv-cache
        export UV_PROJECT_ENVIRONMENT=/openagents-home/dev-cache/agents-venv
        export VIRTUAL_ENV=/openagents-home/dev-cache/agents-venv
        export PATH="$$VIRTUAL_ENV/bin:/root/.local/bin:$$PATH"
        uv sync --frozen --no-dev
        exec python -m src.langgraph_dev
    depends_on:
      sandbox-aio:
        condition: service_healthy
    env_file: *openagents_env_file
    environment:
      OPENAGENTS_HOME: /openagents-home
      OPENAGENTS_CONFIG_PATH: /workspace/config.yaml
      OPENAGENTS_LANGGRAPH_CONFIG_PATH: /workspace/backend/agents/langgraph.json
      OPENAGENTS_EXTENSIONS_CONFIG_PATH: /openagents-home/extensions_config.json
      OPENAGENTS_SANDBOX_BASE_URL: http://sandbox-aio:8080
      PYTHONPATH: /workspace/backend/agents
      PYTHONDONTWRITEBYTECODE: "1"
    extra_hosts: *host_docker_internal
    ports:
      - "${OPENAGENTS_LANGGRAPH_PORT:-2024}:2024"
    healthcheck:
      # LangGraph's dev server exposes the API reference page on `/docs`; this
      # repo does not own a dedicated `/health` route on port 2024.
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:2024/docs"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 120s
    logging: *json_logging
    volumes:
      - *repo_mount
      - *openagents_home_mount
    restart: unless-stopped

  gateway:
    build:
      context: ..
      dockerfile: backend/gateway/Dockerfile
    working_dir: /workspace/backend/gateway
    command:
      - /bin/sh
      - -lc
      - |
        mkdir -p /openagents-home/dev-cache/go-build
        mkdir -p /openagents-home/dev-cache/go-mod
        export GOCACHE=/openagents-home/dev-cache/go-build
        export GOMODCACHE=/openagents-home/dev-cache/go-mod
        exec /usr/local/go/bin/go run ./cmd/server
    depends_on:
      langgraph:
        condition: service_healthy
      onlyoffice:
        condition: service_healthy
      sandbox-aio:
        condition: service_healthy
    env_file: *openagents_env_file
    environment:
      GATEWAY_CONFIG_PATH: /workspace/backend/gateway/gateway.yaml
      OPENAGENTS_CONFIG_PATH: /workspace/config.yaml
      LANGGRAPH_URL: http://langgraph:2024
      ONLYOFFICE_SERVER_URL: /onlyoffice
      ONLYOFFICE_INTERNAL_SERVER_URL: http://onlyoffice:8000
      ONLYOFFICE_PUBLIC_APP_URL: http://gateway:8001
      OPENAGENTS_HOME: /openagents-home
      OPENAGENTS_EXTENSIONS_CONFIG_PATH: /openagents-home/extensions_config.json
    extra_hosts: *host_docker_internal
    ports:
      - "${OPENAGENTS_GATEWAY_PORT:-8001}:8001"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 30s
    logging: *json_logging
    volumes:
      - *repo_mount
      - *openagents_home_mount
    restart: unless-stopped

  app:
    image: node:22-bookworm
    working_dir: /workspace/frontend/app
    command:
      - /bin/sh
      - -lc
      - |
        corepack enable
        pnpm config set store-dir /openagents-home/dev-cache/pnpm-store
        pnpm install --frozen-lockfile
        exec pnpm dev --host 0.0.0.0 --port 3000
    depends_on:
      gateway:
        condition: service_healthy
      onlyoffice:
        condition: service_healthy
      openpencil:
        condition: service_healthy
    environment:
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "300"
      VITE_BACKEND_BASE_URL: http://gateway:8001
      VITE_ONLYOFFICE_DEV_SERVER_URL: http://onlyoffice:8000
      VITE_OPENPENCIL_DEV_SERVER_URL: http://openpencil:3001
    ports:
      - "${OPENAGENTS_APP_PORT:-${OPENAGENTS_APP_DEV_PORT:-8083}}:3000"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:3000').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 45s
    logging: *json_logging
    volumes:
      - *repo_mount
      - *openagents_home_mount
      - type: bind
        source: ${OPENAGENTS_DOCKER_HOST_HOME:-../deploy/data/openagents}/dev-cache/app-node_modules
        target: /workspace/frontend/app/node_modules
    restart: unless-stopped

  admin:
    image: node:22-bookworm
    working_dir: /workspace/frontend/admin
    command:
      - /bin/sh
      - -lc
      - |
        corepack enable
        pnpm config set store-dir /openagents-home/dev-cache/pnpm-store
        pnpm install --frozen-lockfile
        exec pnpm dev --host 0.0.0.0 --port 5173
    depends_on:
      gateway:
        condition: service_healthy
      app:
        condition: service_healthy
    environment:
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "300"
      VITE_GATEWAY_BASE_URL: http://gateway:8001
      # Keep browser-visible URLs aligned with the fixed Docker entrypoints so
      # operators only need to reason about one public port per surface.
      VITE_FRONTEND_BASE_URL: http://127.0.0.1:${OPENAGENTS_APP_PORT:-${OPENAGENTS_APP_DEV_PORT:-8083}}
    ports:
      - "${OPENAGENTS_ADMIN_PORT:-${OPENAGENTS_ADMIN_DEV_PORT:-8081}}:5173"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:5173').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 45s
    logging: *json_logging
    volumes:
      - *repo_mount
      - *openagents_home_mount
      - type: bind
        source: ${OPENAGENTS_DOCKER_HOST_HOME:-../deploy/data/openagents}/dev-cache/admin-node_modules
        target: /workspace/frontend/admin/node_modules
    restart: unless-stopped

  demo-mcp-file-service:
    build:
      context: ..
      dockerfile: frontend/demo/mcp-file-service/Dockerfile.local-base
    working_dir: /workspace/frontend/demo/mcp-file-service
    command:
      - /bin/sh
      - -lc
      - |
        mkdir -p /openagents-home/dev-cache/demo-mcp-uv-cache
        mkdir -p /openagents-home/dev-cache/demo-mcp-venv
        mkdir -p /workspace/frontend/demo/deploy/data/files
        mkdir -p /workspace/frontend/demo/deploy/data/document-cache
        export UV_CACHE_DIR=/openagents-home/dev-cache/demo-mcp-uv-cache
        export UV_PROJECT_ENVIRONMENT=/openagents-home/dev-cache/demo-mcp-venv
        export VIRTUAL_ENV=/openagents-home/dev-cache/demo-mcp-venv
        export PATH="$$VIRTUAL_ENV/bin:$$PATH"
        uv sync --project /workspace/frontend/demo/mcp-file-service --frozen
        exec python -m uvicorn app.main:app --host 0.0.0.0 --port 8090
    environment:
      MCP_WORKBENCH_HOST: 0.0.0.0
      MCP_WORKBENCH_PORT: "8090"
      MCP_WORKBENCH_PUBLIC_BASE_URL: http://127.0.0.1:${OPENAGENTS_DEMO_PORT:-8084}
      # The unified Docker demo shares the same persistent corpus as the
      # standalone demo so uploaded files survive restarts and both stacks agree.
      MCP_WORKBENCH_DATA_DIR: /workspace/frontend/demo/deploy/data/files
      MCP_WORKBENCH_CACHE_DIR: /workspace/frontend/demo/deploy/data/document-cache
      MCP_WORKBENCH_ALLOWED_ORIGINS: http://127.0.0.1:${OPENAGENTS_DEMO_PORT:-8084},http://localhost:${OPENAGENTS_DEMO_PORT:-8084},http://127.0.0.1:8084,http://localhost:8084
      PYTHONPATH: /workspace/frontend/demo/mcp-file-service
      PYTHONDONTWRITEBYTECODE: "1"
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; raise SystemExit(0 if urlopen('http://127.0.0.1:8090/api/health').status == 200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 60s
    logging: *json_logging
    networks:
      default:
        aliases:
          # Keep the internal hostname aligned with the standalone demo compose
          # so existing MCP fixtures can reuse `http://mcp-file-service:8090`
          # across both the dedicated demo stack and the unified dev stack.
          - mcp-file-service
    volumes:
      - *repo_mount
      - *openagents_home_mount
    restart: unless-stopped

  demo:
    # Keep the unified stack's 8084 surface identical to the standalone demo:
    # nginx serves the built UI and reverse-proxies API/MCP traffic to Python.
    # A Vite dev server blocks host-gateway MCP URLs before the request reaches
    # the MCP scanner, which makes container-based agent verification misleading.
    image: openagents-demo-workbench:dev
    build:
      context: ../frontend/demo
      dockerfile: Dockerfile
      args:
        NPM_REGISTRY: ${DEMO_NPM_REGISTRY:-https://registry.npmmirror.com}
        VITE_DEMO_PUBLIC_API_BASE_URL: ${VITE_DEMO_PUBLIC_API_BASE_URL:-http://127.0.0.1:${OPENAGENTS_APP_PORT:-${OPENAGENTS_APP_DEV_PORT:-8083}}/v1}
        VITE_DEMO_PUBLIC_API_KEY: ${VITE_DEMO_PUBLIC_API_KEY:-}
        VITE_DEMO_DEFAULT_AGENT_NAME: ${VITE_DEMO_DEFAULT_AGENT_NAME:-}
        VITE_DEMO_HTTP_AGENT_NAME: ${VITE_DEMO_HTTP_AGENT_NAME:-}
        VITE_DEMO_HTTP_API_KEY: ${VITE_DEMO_HTTP_API_KEY:-}
        VITE_DEMO_WORKBENCH_BASE_URL: ${VITE_DEMO_WORKBENCH_BASE_URL:-http://127.0.0.1:${OPENAGENTS_DEMO_PORT:-8084}}
    depends_on:
      gateway:
        condition: service_healthy
      demo-mcp-file-service:
        condition: service_healthy
    ports:
      - "${OPENAGENTS_DEMO_PORT:-8084}:8084"
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1:8084/api/health >/dev/null
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 45s
    logging: *json_logging
    restart: unless-stopped

  provisioner:
    profiles:
      - provisioner
    build:
      context: ./provisioner
      dockerfile: Dockerfile
    volumes:
      - ~/.kube/config:/root/.kube/config:ro
    environment:
      K8S_NAMESPACE: ${K8S_NAMESPACE:-openagents}
      SANDBOX_IMAGE: enterprise-public-cn-beijing.cr.volces.com/vefaas-public/all-in-one-sandbox:latest
      KUBECONFIG_PATH: ${KUBECONFIG_PATH:-/root/.kube/config}
      NODE_HOST: ${NODE_HOST:-}
      K8S_API_SERVER: ${K8S_API_SERVER:-}
      # Provisioned sandboxes mount host data directly, so these must resolve
      # to real host paths before compose starts.
      OPENAGENTS_HOME: ${OPENAGENTS_DOCKER_HOST_HOME:-../deploy/data/openagents}
      SKILLS_HOST_PATH: ${OPENAGENTS_DOCKER_HOST_HOME:-../deploy/data/openagents}/skills
      THREADS_HOST_PATH: ${OPENAGENTS_DOCKER_HOST_HOME:-../deploy/data/openagents}/threads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    logging: *json_logging
    restart: unless-stopped

  openpencil:
    image: oven/bun:1.3.10
    working_dir: /workspace/openpencil
    command:
      - /bin/sh
      - -lc
      - |
        export BUN_INSTALL_CACHE_DIR=/openagents-home/dev-cache/bun-install
        bun install
        exec bun run dev -- --host 0.0.0.0
    environment:
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "300"
      OPENPENCIL_BASE_PATH: /openpencil
    ports:
      - "${OPENAGENTS_OPENPENCIL_PORT:-3001}:3001"
    healthcheck:
      test:
        - CMD
        - bun
        - -e
        - fetch('http://127.0.0.1:3001/openpencil/').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 90s
    logging: *json_logging
    volumes:
      - *repo_mount
      - *openagents_home_mount
      - type: bind
        source: ${OPENAGENTS_DOCKER_HOST_HOME:-../deploy/data/openagents}/dev-cache/openpencil-node_modules
        target: /workspace/openpencil/node_modules
    restart: unless-stopped

name: openagents-prod

networks:
  default:
    # Keep the production bridge network stable so external model-gateway
    # containers can join it without depending on Docker Compose's generated
    # `<project>_default` naming convention.
    name: ${OPENAGENTS_DOCKER_NETWORK:-openagents-prod_openagents}

x-openagents-env-file: &openagents_env_file
  # Production deployments should keep secrets next to this compose file, like
  # docker-deploy.sh prepares. The file is optional so operators can still pass
  # environment variables directly in CI or during local verification.
  - path: ${OPENAGENTS_ENV_FILE:-.env}
    required: false

x-json-logging: &json_logging
  # Keep production logs in Docker's normal stdout/stderr path while bounding
  # local disk growth on single-node deployments.
  driver: json-file
  options:
    max-size: "20m"
    max-file: "5"

x-openagents-home-mount: &openagents_home_mount
  # This is the authoritative runtime data root. Moving OpenAgents to another
  # machine should primarily mean copying this directory plus the PostgreSQL and
  # MinIO data directories configured below.
  type: bind
  source: ${OPENAGENTS_DOCKER_HOST_HOME:-./data/openagents}
  target: /openagents-home

x-openagents-sandbox-mount: &openagents_sandbox_mount
  # Sandbox-visible data intentionally uses a stable in-container path so
  # /mnt/user-data/... rewrites never depend on the host directory layout.
  type: bind
  source: ${OPENAGENTS_DOCKER_HOST_HOME:-./data/openagents}
  target: /openagents

services:
  postgres:
    image: postgres:16-alpine
    environment:
      # Pin PGDATA to the bind-mounted directory so future image default changes
      # cannot silently initialize the database under an anonymous image volume.
      PGDATA: /var/lib/postgresql/data
      POSTGRES_DB: ${OPENAGENTS_POSTGRES_DB:-openagents}
      POSTGRES_USER: ${OPENAGENTS_POSTGRES_USER:-openagents}
      POSTGRES_PASSWORD: ${OPENAGENTS_POSTGRES_PASSWORD:?OPENAGENTS_POSTGRES_PASSWORD is required; run scripts/docker-deploy.sh}
    ports:
      # Bind to loopback by default: operators can run psql/migrations from the
      # host without exposing PostgreSQL to the network.
      - "127.0.0.1:${OPENAGENTS_POSTGRES_PORT:-15432}:5432"
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    volumes:
      - type: bind
        # Keep database bytes outside Docker's anonymous volume store so backup
        # and migration are explicit filesystem operations.
        source: ${OPENAGENTS_POSTGRES_DATA_DIR:-./data/postgres}
        target: /var/lib/postgresql/data
    logging: *json_logging
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${OPENAGENTS_MINIO_ROOT_USER:-openagents}
      MINIO_ROOT_PASSWORD: ${OPENAGENTS_MINIO_ROOT_PASSWORD:?OPENAGENTS_MINIO_ROOT_PASSWORD is required; run scripts/docker-deploy.sh}
    ports:
      # MinIO stays loopback-only by default because the application talks to it
      # over the compose network; expose it through a real reverse proxy if the
      # object store must be administered remotely.
      - "127.0.0.1:${OPENAGENTS_MINIO_API_PORT:-19000}:9000"
      - "127.0.0.1:${OPENAGENTS_MINIO_CONSOLE_PORT:-19001}:9001"
    volumes:
      - type: bind
        # Knowledge-base binaries live here when KNOWLEDGE_OBJECT_STORE=minio.
        # Copy this directory with PostgreSQL rows to preserve storage_refs.
        source: ${OPENAGENTS_MINIO_DATA_DIR:-./data/minio}
        target: /data
    logging: *json_logging
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    environment:
      MINIO_ROOT_USER: ${OPENAGENTS_MINIO_ROOT_USER:-openagents}
      MINIO_ROOT_PASSWORD: ${OPENAGENTS_MINIO_ROOT_PASSWORD:?OPENAGENTS_MINIO_ROOT_PASSWORD is required; run scripts/docker-deploy.sh}
      KNOWLEDGE_S3_BUCKET: ${KNOWLEDGE_S3_BUCKET:-openagents-knowledge}
    # The mc image entrypoint is the `mc` binary, so override it before running
    # shell logic for wait-and-create initialization.
    entrypoint: ["/bin/sh", "-lc"]
    command:
      - |
        until mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"; do
          sleep 2
        done
        # Bucket creation is idempotent so redeploys do not mutate existing
        # objects or require a separate first-run script.
        mc mb --ignore-existing "local/$${KNOWLEDGE_S3_BUCKET}"
    logging: *json_logging
    restart: "no"

  sandbox-aio:
    image: ${OPENAGENTS_SANDBOX_AIO_IMAGE:-${OPENAGENTS_IMAGE_REGISTRY:-docker.io}/${OPENAGENTS_IMAGE_REPOSITORY:-zhangxuan2/openagents}:sandbox-aio-${OPENAGENTS_IMAGE_TAG:-latest}}
    env_file: *openagents_env_file
    ports:
      - "${OPENAGENTS_SANDBOX_PORT:-18080}:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/v1/sandbox"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s
    security_opt:
      - seccomp=unconfined
      - apparmor=unconfined
      - systempaths=unconfined
    volumes:
      - *openagents_home_mount
      - *openagents_sandbox_mount
    logging: *json_logging
    restart: unless-stopped

  onlyoffice:
    image: ${OPENAGENTS_ONLYOFFICE_IMAGE:-${OPENAGENTS_IMAGE_REGISTRY:-docker.io}/${OPENAGENTS_IMAGE_REPOSITORY:-zhangxuan2/openagents}:onlyoffice-${OPENAGENTS_IMAGE_TAG:-latest}}
    env_file: *openagents_env_file
    environment:
      JWT_ENABLED: "true"
    ports:
      - "${OPENAGENTS_ONLYOFFICE_PORT:-8082}:80"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 8
      start_period: 90s
    logging: *json_logging
    restart: unless-stopped

  openpencil:
    image: ${OPENAGENTS_OPENPENCIL_IMAGE:-${OPENAGENTS_IMAGE_REGISTRY:-docker.io}/${OPENAGENTS_IMAGE_REPOSITORY:-zhangxuan2/openagents}:openpencil-${OPENAGENTS_IMAGE_TAG:-latest}}
    environment:
      NODE_ENV: production
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: "3000"
      OPENPENCIL_BASE_PATH: /openpencil
    healthcheck:
      test:
        - CMD
        - bun
        - -e
        - fetch('http://127.0.0.1:3000/openpencil/').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 90s
    logging: *json_logging
    restart: unless-stopped

  langgraph:
    image: ${OPENAGENTS_LANGGRAPH_IMAGE:-${OPENAGENTS_IMAGE_REGISTRY:-docker.io}/${OPENAGENTS_IMAGE_REPOSITORY:-zhangxuan2/openagents}:langgraph-${OPENAGENTS_IMAGE_TAG:-latest}}
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      sandbox-aio:
        condition: service_healthy
    env_file: *openagents_env_file
    environment:
      DATABASE_URI: ${OPENAGENTS_DATABASE_URI:-postgresql://${OPENAGENTS_POSTGRES_USER:-openagents}:${OPENAGENTS_POSTGRES_PASSWORD:?OPENAGENTS_POSTGRES_PASSWORD is required; run scripts/docker-deploy.sh}@postgres:5432/${OPENAGENTS_POSTGRES_DB:-openagents}?sslmode=disable}
      OPENAGENTS_HOME: /openagents-home
      OPENAGENTS_CONFIG_PATH: /app/config.yaml
      OPENAGENTS_LANGGRAPH_CONFIG_PATH: /app/backend/agents/langgraph.json
      OPENAGENTS_EXTENSIONS_CONFIG_PATH: /openagents-home/extensions_config.json
      OPENAGENTS_SANDBOX_BASE_URL: http://sandbox-aio:8080
      OPENAGENTS_SANDBOX_SHARED_DATA_MOUNT_PATH: /openagents
      KNOWLEDGE_OBJECT_STORE: ${KNOWLEDGE_OBJECT_STORE:-minio}
      KNOWLEDGE_S3_ENDPOINT: ${KNOWLEDGE_S3_ENDPOINT:-http://minio:9000}
      KNOWLEDGE_S3_ACCESS_KEY: ${KNOWLEDGE_S3_ACCESS_KEY:-${OPENAGENTS_MINIO_ROOT_USER:-openagents}}
      KNOWLEDGE_S3_SECRET_KEY: ${KNOWLEDGE_S3_SECRET_KEY:-${OPENAGENTS_MINIO_ROOT_PASSWORD:?OPENAGENTS_MINIO_ROOT_PASSWORD is required; run scripts/docker-deploy.sh}}
      KNOWLEDGE_S3_BUCKET: ${KNOWLEDGE_S3_BUCKET:-openagents-knowledge}
      PYTHONPATH: /app/backend/agents
      PYTHONDONTWRITEBYTECODE: "1"
    volumes:
      - *openagents_home_mount
      - type: bind
        # Keep deployment config external to the image so the same Docker Hub
        # tag can run in different environments without rebuilding.
        source: ${OPENAGENTS_CONFIG_FILE:-./config.yaml}
        target: /app/config.yaml
        read_only: true
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:2024/docs"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 120s
    logging: *json_logging
    restart: unless-stopped

  gateway:
    image: ${OPENAGENTS_GATEWAY_IMAGE:-${OPENAGENTS_IMAGE_REGISTRY:-docker.io}/${OPENAGENTS_IMAGE_REPOSITORY:-zhangxuan2/openagents}:gateway-${OPENAGENTS_IMAGE_TAG:-latest}}
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      langgraph:
        condition: service_healthy
      onlyoffice:
        condition: service_healthy
      sandbox-aio:
        condition: service_healthy
    env_file: *openagents_env_file
    environment:
      DATABASE_URI: ${OPENAGENTS_DATABASE_URI:-postgresql://${OPENAGENTS_POSTGRES_USER:-openagents}:${OPENAGENTS_POSTGRES_PASSWORD:?OPENAGENTS_POSTGRES_PASSWORD is required; run scripts/docker-deploy.sh}@postgres:5432/${OPENAGENTS_POSTGRES_DB:-openagents}?sslmode=disable}
      GATEWAY_CONFIG_PATH: /app/backend/gateway/gateway.yaml
      OPENAGENTS_CONFIG_PATH: /app/config.yaml
      LANGGRAPH_URL: http://langgraph:2024
      ONLYOFFICE_SERVER_URL: /onlyoffice
      ONLYOFFICE_INTERNAL_SERVER_URL: http://onlyoffice:80
      ONLYOFFICE_PUBLIC_APP_URL: http://gateway:8001
      OPENAGENTS_HOME: /openagents-home
      OPENAGENTS_EXTENSIONS_CONFIG_PATH: /openagents-home/extensions_config.json
      KNOWLEDGE_OBJECT_STORE: ${KNOWLEDGE_OBJECT_STORE:-minio}
      KNOWLEDGE_S3_ENDPOINT: ${KNOWLEDGE_S3_ENDPOINT:-http://minio:9000}
      KNOWLEDGE_S3_ACCESS_KEY: ${KNOWLEDGE_S3_ACCESS_KEY:-${OPENAGENTS_MINIO_ROOT_USER:-openagents}}
      KNOWLEDGE_S3_SECRET_KEY: ${KNOWLEDGE_S3_SECRET_KEY:-${OPENAGENTS_MINIO_ROOT_PASSWORD:?OPENAGENTS_MINIO_ROOT_PASSWORD is required; run scripts/docker-deploy.sh}}
      KNOWLEDGE_S3_BUCKET: ${KNOWLEDGE_S3_BUCKET:-openagents-knowledge}
    volumes:
      - *openagents_home_mount
      - type: bind
        # Root config remains operator-owned; the image carries code only.
        source: ${OPENAGENTS_CONFIG_FILE:-./config.yaml}
        target: /app/config.yaml
        read_only: true
      - type: bind
        # Gateway routing/auth config is likewise external so deployments can
        # tune upstreams and logging without producing a private image.
        source: ${OPENAGENTS_GATEWAY_CONFIG_FILE:-./gateway.yaml}
        target: /app/backend/gateway/gateway.yaml
        read_only: true
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 30s
    logging: *json_logging
    restart: unless-stopped

  nginx:
    image: ${OPENAGENTS_NGINX_IMAGE:-${OPENAGENTS_IMAGE_REGISTRY:-docker.io}/${OPENAGENTS_IMAGE_REPOSITORY:-zhangxuan2/openagents}:nginx-${OPENAGENTS_IMAGE_TAG:-latest}}
    depends_on:
      gateway:
        condition: service_healthy
      onlyoffice:
        condition: service_healthy
      openpencil:
        condition: service_healthy
    ports:
      - "${OPENAGENTS_APP_PORT:-8083}:80"
      - "${OPENAGENTS_ADMIN_PORT:-8081}:8081"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 30s
    logging: *json_logging
    restart: unless-stopped

name: openagents-prod

# OpenAgents 正式环境单机版编排。
# 这份文件的目标不是做复杂的多节点部署，而是让你把仓库传到服务器后，
# 直接执行 docker compose 命令就能启动。
#
# 推荐命令（在 docker/ 目录执行）：
# - docker compose --env-file ../.env -p openagents-prod -f docker-compose-prod.yaml build
# - docker compose --env-file ../.env -p openagents-prod -f docker-compose-prod.yaml up -d
#
# 与 docker-compose-dev.yaml 的核心差异：
# - 前端不跑 Vite，改为构建静态产物后由 nginx 提供
# - gateway / langgraph 都直接挂整个仓库根目录，减少零碎挂载
# - sandbox-aio / onlyoffice 作为正式环境基础能力常驻
# - 默认只暴露 nginx 和 onlyoffice 端口
# - 所有 build context 和挂载路径都固定为相对 docker/ 的路径
#   不再依赖额外的正式环境参数

services:
  # 用户前台 + 后台管理统一由一个 nginx 容器托管。
  # - 80: 面向普通用户的前台
  # - 8081: 面向管理后台的前端
  nginx:
    build:
      # 从仓库根目录构建，这样 nginx 镜像可以直接复制两个前端的源码并完成打包。
      context: ..
      dockerfile: docker/nginx/Dockerfile.prod
    depends_on:
      gateway:
        # 等 gateway 健康后再起 nginx，避免 nginx 先起来但 API 还没就绪。
        condition: service_healthy
    ports:
      # 正式环境固定端口，不再额外抽象为 compose 变量。
      - "8083:80"
      - "8081:8081"
    networks:
      - openagents
    restart: unless-stopped

  # Go Gateway:
  # - 用户登录鉴权
  # - Agent / Skill / Model / Thread / Knowledge API
  # - 代理 /api/langgraph/* 到 Python LangGraph runtime
  gateway:
    build:
      context: ..
      dockerfile: backend/gateway/Dockerfile
    command:
      # 正式环境同样直接跑仓库挂载进来的 Go 源码：
      # - 首次 build 只负责准备 Go/LibreOffice 依赖
      # - 之后纯 Gateway 代码更新只需要 restart，不必重新 build 这个重镜像
      # GATEWAY_CONFIG_PATH 指向仓库中的正式配置文件。
      - sh
      - -lc
      - cd /app/backend/gateway && GATEWAY_CONFIG_PATH=/app/backend/gateway/gateway.yaml go run ./cmd/server
    depends_on:
      langgraph:
        # 这里只要求 langgraph 进程已启动；真正 API 可用性由 gateway 自己重试和上游访问决定。
        condition: service_started
      onlyoffice:
        condition: service_healthy
      sandbox-aio:
        condition: service_healthy
    environment:
      # OpenAgents 运行时根目录，归档数据、线程数据等都从这里读写。
      OPENAGENTS_HOME: /openagents-home
      # MCP / skills 扩展配置文件位置。
      OPENAGENTS_EXTENSIONS_CONFIG_PATH: /openagents-home/extensions_config.json
      # Gateway 访问 LangGraph 的容器内地址。
      LANGGRAPH_URL: http://langgraph:2024
      # ONLYOFFICE 回调给 Gateway 时使用的容器内地址。
      # 这是容器间访问地址，不是浏览器访问地址。
      ONLYOFFICE_PUBLIC_APP_URL: http://gateway:8001
    healthcheck:
      # Gateway 自身健康检查，nginx 依赖这个状态。
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 20s
    networks:
      - openagents
    restart: unless-stopped
    volumes:
      # 整个仓库只读挂到 /app：
      # - .env
      # - config.yaml
      # - backend/gateway/gateway.yaml
      # - 代码本身
      # 都直接用服务器上这份仓库，不再拆散挂载。
      - ../:/app:ro
      # OpenAgents 持久化目录。
      # 这里不要删，删了会把 agent / threads / knowledge 这类运行时数据一起清掉。
      - ../.openagents:/openagents-home
    working_dir: /app

  # ONLYOFFICE 文档服务。
  # 浏览器访问它的 8082 端口，在线预览和编辑 office 文档都走这里。
  onlyoffice:
    build:
      # onlyoffice 的 Dockerfile 在 docker/ 子目录下，所以这里 context 只需要当前目录。
      context: .
      dockerfile: onlyoffice/Dockerfile
    env_file:
      # 读取根目录 .env 里的 secrets，例如 JWT_SECRET / ONLYOFFICE_JWT_SECRET。
      - ../.env
    entrypoint:
      # 优先使用 ONLYOFFICE_JWT_SECRET；
      # 如果没单独配置，就退回复用 JWT_SECRET。
      - /bin/bash
      - -lc
      - export JWT_SECRET="$${ONLYOFFICE_JWT_SECRET:-$${JWT_SECRET}}"; exec /app/ds/run-document-server.sh
    environment:
      # 开启 ONLYOFFICE 自身的 JWT 校验。
      JWT_ENABLED: "true"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    image: openagents-onlyoffice:9.3.1-cjk
    networks:
      - openagents
    ports:
      - "8082:80"
    restart: unless-stopped

  # 共享 AIO Sandbox。
  # 这是 Python runtime 真正执行文件读写、命令运行等能力的地方。
  sandbox-aio:
    build:
      context: .
      dockerfile: sandbox-aio/Dockerfile
      args:
        # sandbox-aio 的基础镜像。这里保留为 build arg，
        # 只是为了 Dockerfile 里 FROM ${BASE_IMAGE} 能正常工作。
        BASE_IMAGE: enterprise-public-cn-beijing.cr.volces.com/vefaas-public/all-in-one-sandbox:latest
    env_file:
      # 让 sandbox 内执行出来的技能也能读到根目录 .env 中的 API Key。
      - ../.env
    healthcheck:
      # 检查 sandbox HTTP API 是否就绪。
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/v1/sandbox"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 20s
    image: openagents-sandbox-aio:prod
    networks:
      - openagents
    restart: unless-stopped
    security_opt:
      # AIO sandbox 运行需要较宽松的 seccomp 配置。
      - seccomp=unconfined
    volumes:
      # env_file 是把 secrets 注入进容器进程环境；
      # 这里再额外挂一份 .env 到容器里，仅用于排障时能看到同一份来源文件。
      - ../.env:/openagents/.env:ro
      # sandbox 内的 /openagents 对应宿主机仓库根目录下的 .openagents。
      - ../.openagents:/openagents

  # Python LangGraph runtime。
  # 真正运行 agent 推理、工具调用、线程执行逻辑的就是这个容器。
  langgraph:
    build:
      context: ..
      dockerfile: backend/agents/Dockerfile
    depends_on:
      sandbox-aio:
        condition: service_healthy
    environment:
      # Python runtime 的归档/线程数据根目录。
      OPENAGENTS_HOME: /openagents-home
      # 指向仓库根目录 config.yaml。
      OPENAGENTS_CONFIG_PATH: /app/config.yaml
      # 指向统一扩展配置文件。
      OPENAGENTS_EXTENSIONS_CONFIG_PATH: /openagents-home/extensions_config.json
      # LangGraph 访问共享 sandbox-aio 的容器内地址。
      OPENAGENTS_SANDBOX_BASE_URL: http://sandbox-aio:8080
    networks:
      - openagents
    restart: unless-stopped
    volumes:
      # 挂整个仓库根目录，配置和代码统一来自服务器上的当前仓库。
      # Python 依赖在镜像里的 /opt/venv，不会因为源码挂载而丢失。
      - ../:/app:ro
      - ../.openagents:/openagents-home
    working_dir: /app

networks:
  # 单机 bridge 网络，容器之间通过服务名互相访问。
  openagents:
    driver: bridge

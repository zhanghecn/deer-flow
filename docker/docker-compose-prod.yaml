name: openagents-prod

x-openagents-env-file: &openagents_env_file
  - ${OPENAGENTS_ENV_FILE:-../.env}

x-json-logging: &json_logging
  # Keep application logs on stdout/stderr and let Docker rotate them.
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

x-host-docker-internal: &host_docker_internal
  # Containers may need to reach host-managed services such as PostgreSQL or MinIO
  # when the shared root `.env` uses `host.docker.internal`.
  - "host.docker.internal:host-gateway"

services:
  # 统一托管用户前台和后台管理页面。
  nginx:
    build:
      context: ..
      dockerfile: docker/nginx/Dockerfile.prod
    depends_on:
      gateway:
        condition: service_healthy
      openpencil:
        # Wait for the proxied OpenPencil server to finish booting before
        # exposing the unified app entrypoint, otherwise a fresh recreate can
        # briefly return 502 on /openpencil/*.
        condition: service_healthy
    ports:
      - "${OPENAGENTS_APP_PORT:-8083}:80"
      - "${OPENAGENTS_ADMIN_PORT:-8081}:8081"
    networks:
      - openagents
    restart: unless-stopped

  openpencil:
    # Build from the vendored repo copy so Deer Flow and OpenPencil ship as
    # one project and the `/openpencil` bridge contract always matches source.
    build:
      context: ../openpencil
      dockerfile: Dockerfile
    image: openagents-prod-openpencil
    environment:
      NODE_ENV: production
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: 3000
      OPENPENCIL_BASE_PATH: /openpencil
    healthcheck:
      # Probe the actual editor route instead of the bare root so nginx only
      # starts after the base-path-aware OpenPencil app is serving requests.
      test:
        - CMD
        - bun
        - -e
        - fetch("http://127.0.0.1:3000/openpencil/editor").then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - openagents
    restart: unless-stopped

  # Go 网关：
  # - 登录鉴权
  # - 线程 / 知识库 / Agent / Model API
  # - 反向代理 /api/langgraph 到 Python runtime
  gateway:
    build:
      context: ..
      dockerfile: backend/gateway/Dockerfile
    # 直接在挂载进来的 gateway 源码目录里启动，不再额外写 cd 命令。
    working_dir: /app/backend/gateway
    command: ["/usr/local/go/bin/go", "run", "./cmd/server"]
    depends_on:
      langgraph:
        condition: service_started
      onlyoffice:
        condition: service_healthy
      sandbox-aio:
        condition: service_healthy
    environment:
      GATEWAY_CONFIG_PATH: /app/backend/gateway/gateway.yaml
      OPENAGENTS_CONFIG_PATH: /app/config.yaml
      LANGGRAPH_URL: http://langgraph:2024
      ONLYOFFICE_SERVER_URL: /onlyoffice
      ONLYOFFICE_INTERNAL_SERVER_URL: http://onlyoffice
      ONLYOFFICE_PUBLIC_APP_URL: http://gateway:8001
      OPENAGENTS_HOME: /openagents-home
      OPENAGENTS_EXTENSIONS_CONFIG_PATH: /openagents-home/extensions_config.json
    healthcheck:
      # 网关健康后，nginx 才会接外部流量。
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 20s
    extra_hosts: *host_docker_internal
    logging: *json_logging
    volumes:
      # 只挂自己需要热更新的代码和配置。
      - ../backend/gateway:/app/backend/gateway:ro
      - ${OPENAGENTS_ENV_FILE:-../.env}:/app/.env:ro
      # 网关也要读取仓库根 config.yaml，保证工具目录与 runtime 配置一致。
      - ../config.yaml:/app/config.yaml:ro
      - ${OPENAGENTS_DOCKER_HOST_HOME:-../.openagents}:/openagents-home
    networks:
      - openagents
    restart: unless-stopped

  # ONLYOFFICE 文档预览/编辑服务。
  onlyoffice:
    build:
      context: .
      dockerfile: onlyoffice/Dockerfile
    image: openagents-onlyoffice:9.3.1-cjk
    # Host-run local development still reuses this compose-managed ONLYOFFICE
    # service, so keep a stable host port instead of forcing a second compose file.
    ports:
      - "${OPENAGENTS_ONLYOFFICE_PORT:-8082}:80"
    env_file: *openagents_env_file
    entrypoint:
      - /bin/bash
      - -lc
      - export JWT_SECRET="$${ONLYOFFICE_JWT_SECRET:-$${JWT_SECRET}}"; exec /app/ds/run-document-server.sh
    environment:
      JWT_ENABLED: "true"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - openagents
    restart: unless-stopped

  # 共享 AIO sandbox。
  # LangGraph 里的文件读写、命令执行最后都落到这里。
  sandbox-aio:
    build:
      context: .
      dockerfile: sandbox-aio/Dockerfile
      args:
        BASE_IMAGE: enterprise-public-cn-beijing.cr.volces.com/vefaas-public/all-in-one-sandbox:latest
    image: openagents-sandbox-aio:prod
    env_file: *openagents_env_file
    ports:
      # Expose the sandbox admin/management UI to the host without changing the
      # in-network contract used by LangGraph and other containers.
      - "${OPENAGENTS_SANDBOX_PORT:-18080}:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/v1/sandbox"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 20s
    security_opt:
      - seccomp=unconfined
      # bwrap 会在 sandbox-aio 容器里做 mount / namespace 隔离，Ubuntu 服务器上常被默认 AppArmor 拦住。
      - apparmor=unconfined
      # Docker 默认会屏蔽一部分 /proc system paths，bwrap 重新挂 proc 时会被这里拦住。
      - systempaths=unconfined
    volumes:
      # 运行时线程目录、产物、缓存都写到仓库根目录的 .openagents 下。
      - ${OPENAGENTS_DOCKER_HOST_HOME:-../.openagents}:/openagents
    networks:
      - openagents
    restart: unless-stopped

  # Kubernetes provisioner。
  # 这是唯一 compose 文件里的可选 control-plane 服务，只在 provisioner 模式启用。
  provisioner:
    profiles:
      - provisioner
    build:
      context: ./provisioner
      dockerfile: Dockerfile
    volumes:
      - ~/.kube/config:/root/.kube/config:ro
    environment:
      K8S_NAMESPACE: ${K8S_NAMESPACE:-openagents}
      SANDBOX_IMAGE: enterprise-public-cn-beijing.cr.volces.com/vefaas-public/all-in-one-sandbox:latest
      KUBECONFIG_PATH: ${KUBECONFIG_PATH:-/root/.kube/config}
      NODE_HOST: ${NODE_HOST:-}
      K8S_API_SERVER: ${K8S_API_SERVER:-}
      # Provisioned sandboxes mount host data directly, so these must resolve to
      # real host paths before compose starts.
      OPENAGENTS_HOME: ${OPENAGENTS_DOCKER_HOST_HOME:-../.openagents}
      SKILLS_HOST_PATH: ${OPENAGENTS_DOCKER_HOST_HOME:-../.openagents}/skills
      THREADS_HOST_PATH: ${OPENAGENTS_DOCKER_HOST_HOME:-../.openagents}/threads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    networks:
      - openagents
    restart: unless-stopped

  # Python LangGraph runtime。
  langgraph:
    build:
      context: ..
      dockerfile: backend/agents/Dockerfile
    # 运行时会写 .langgraph_api，所以工作目录必须放在可写的 .openagents 下，
    # 不能放在只读源码目录里。
    working_dir: /openagents-home/runtime/langgraph
    command: ["python", "-m", "src.langgraph_dev"]
    depends_on:
      sandbox-aio:
        condition: service_healthy
    environment:
      OPENAGENTS_HOME: /openagents-home
      OPENAGENTS_CONFIG_PATH: /app/config.yaml
      OPENAGENTS_LANGGRAPH_CONFIG_PATH: /app/backend/agents/langgraph.json
      OPENAGENTS_EXTENSIONS_CONFIG_PATH: /openagents-home/extensions_config.json
      OPENAGENTS_SANDBOX_BASE_URL: http://sandbox-aio:8080
      # 源码目录是只读挂载，不要往里面写 __pycache__。
      PYTHONDONTWRITEBYTECODE: "1"
      # src.langgraph_dev 在 /app/backend/agents 这棵源码下面。
      PYTHONPATH: /app/backend/agents
    extra_hosts:
      *host_docker_internal
    logging: *json_logging
    volumes:
      - ../backend/agents:/app/backend/agents:ro
      - ../backend/deepagents:/app/backend/deepagents:ro
      - ${OPENAGENTS_ENV_FILE:-../.env}:/app/.env:ro
      - ../config.yaml:/app/config.yaml:ro
      - ${OPENAGENTS_DOCKER_HOST_HOME:-../.openagents}:/openagents-home
    networks:
      - openagents
    restart: unless-stopped

networks:
  # 单机 bridge 网络，服务之间通过服务名互相访问。
  openagents:
    driver: bridge

# OpenAgents Development Environment
# Usage: docker-compose -f docker-compose-dev.yaml up --build
#
# Services:
#   - nginx: Reverse proxy (port 2026)
#   - frontend: Frontend Next.js dev server (port 3000)
#   - gateway: Backend Gateway API (port 8001)
#   - onlyoffice: ONLYOFFICE Docs server (port 8082)
#   - langgraph: LangGraph server (port 2024)
#   - provisioner (optional): Sandbox provisioner (creates Pods in host Kubernetes)
#
# Prerequisites:
#   - Kubernetes cluster + kubeconfig are only required when using provisioner mode.
#
# Access: http://localhost:2026

services:
  # ── Sandbox Provisioner ────────────────────────────────────────────────
  # Manages per-sandbox Pod + Service lifecycle in the host Kubernetes
  # cluster via the K8s API.
  # Backend accesses sandboxes directly via host.docker.internal:{NodePort}.
  provisioner:
    profiles:
      - provisioner
    build:
      context: ./provisioner
      dockerfile: Dockerfile
    container_name: openagents-provisioner
    volumes:
      - ~/.kube/config:/root/.kube/config:ro
    environment:
      - K8S_NAMESPACE=openagents
      - SANDBOX_IMAGE=enterprise-public-cn-beijing.cr.volces.com/vefaas-public/all-in-one-sandbox:latest
      # Host paths for K8s HostPath volumes (must be absolute paths accessible by K8s node)
      # On Docker Desktop/OrbStack, use your actual host paths like /Users/username/...
      # Set these in your shell before running docker-compose:
      #   export OPENAGENTS_ROOT=/absolute/path/to/openagents
      - SKILLS_HOST_PATH=${OPENAGENTS_ROOT}/skills
      - THREADS_HOST_PATH=${OPENAGENTS_ROOT}/backend/agents/.openagents/threads
      - KUBECONFIG_PATH=/root/.kube/config
      - NODE_HOST=host.docker.internal
      # Override K8S API server URL since kubeconfig uses 127.0.0.1
      # which is unreachable from inside the container
      - K8S_API_SERVER=https://host.docker.internal:26443
    env_file:
      - ../.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - openagents-dev
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  # ── Reverse Proxy ──────────────────────────────────────────────────────
  # Routes API traffic to gateway/langgraph and (optionally) provisioner.
  # Select nginx config via NGINX_CONF:
  # - nginx.local.conf (default): no provisioner route (local/aio modes)
  # - nginx.conf: includes provisioner route (provisioner mode)
  nginx:
    image: nginx:alpine
    container_name: openagents-nginx
    ports:
      - "2026:2026"
    volumes:
      - ./nginx/${NGINX_CONF:-nginx.conf}:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - gateway
      - langgraph
    networks:
      - openagents-dev
    restart: unless-stopped

  # Frontend - Next.js Development Server
  frontend:
    build:
      context: ../
      dockerfile: frontend/app/Dockerfile
      args:
        PNPM_STORE_PATH: ${PNPM_STORE_PATH:-/root/.local/share/pnpm/store}
    container_name: openagents-frontend
    command: sh -c "cd frontend/app && pnpm run dev > /app/logs/frontend.log 2>&1"
    volumes:
      - ../frontend/app/src:/app/frontend/app/src
      - ../frontend/app/public:/app/frontend/app/public
      - ../frontend/app/next.config.js:/app/frontend/app/next.config.js:ro
      - ../logs:/app/logs
      # Mount pnpm store for caching
      - ${PNPM_STORE_PATH:-~/.local/share/pnpm/store}:/root/.local/share/pnpm/store
    working_dir: /app
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
      - CI=true
    env_file:
      - ../frontend/app/.env
    networks:
      - openagents-dev
    restart: unless-stopped

  # Backend - Gateway API
  gateway:
    build:
      context: ../
      dockerfile: backend/gateway/Dockerfile
      cache_from:
        - type=local,src=/tmp/docker-cache-gateway
    container_name: openagents-gateway
    command: sh -c "cd backend/gateway && GATEWAY_CONFIG_PATH=gateway.yaml go run ./cmd/server > /app/logs/gateway.log 2>&1"
    volumes:
      - ../backend/gateway:/app/backend/gateway
      - ../.env:/app/.env:ro
      - ../logs:/app/logs
      # Mount Go cache for faster dependency installation
      - ~/.cache/go-build:/root/.cache/go-build
    working_dir: /app
    environment:
      - CI=true
    env_file:
      - ../.env
    extra_hosts:
      # For Linux: map host.docker.internal to host gateway
      - "host.docker.internal:host-gateway"
    networks:
      - openagents-dev
    restart: unless-stopped

  # Document Server - ONLYOFFICE Docs
  onlyoffice:
    build:
      context: .
      dockerfile: onlyoffice/Dockerfile
    image: openagents-onlyoffice:9.3.1-cjk
    container_name: openagents-onlyoffice
    ports:
      - "127.0.0.1:${ONLYOFFICE_PORT:-8082}:80"
    env_file:
      - ../.env
    environment:
      - JWT_ENABLED=true
    entrypoint:
      - /bin/bash
      - -lc
      - export JWT_SECRET="$${ONLYOFFICE_JWT_SECRET}"; exec /app/ds/run-document-server.sh
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - openagents-dev
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # Backend - LangGraph Server
  langgraph:
    build:
      context: ../
      dockerfile: backend/agents/Dockerfile
      cache_from:
        - type=local,src=/tmp/docker-cache-langgraph
    container_name: openagents-langgraph
    command: sh -c "cd /app/backend/agents && uv run python -m src.langgraph_dev > /app/logs/langgraph.log 2>&1"
    volumes:
      - ../backend/agents:/app/backend/agents
      - ../.env:/app/.env:ro
      - ../config.yaml:/app/config.yaml
      - ../skills:/app/skills
      - ../logs:/app/logs
      - ../backend/agents/.openagents:/app/backend/agents/.openagents
      # Mount uv cache for faster dependency installation
      - ~/.cache/uv:/root/.cache/uv
    working_dir: /app
    environment:
      - CI=true
    env_file:
      - ../.env
    networks:
      - openagents-dev
    restart: unless-stopped

volumes: {}

networks:
  openagents-dev:
    driver: bridge

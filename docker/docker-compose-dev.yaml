name: openagents-dev

# OpenAgents Development Environment
# Usage: docker compose --env-file ../.env -f docker-compose-dev.yaml up --build
#
# Services:
#   - nginx: Reverse proxy (port 2026)
#   - frontend: Frontend Next.js dev server (port 3000)
#   - gateway: Backend Gateway API (port 8001)
#   - onlyoffice: ONLYOFFICE Docs server (port 8082)
#   - langgraph: LangGraph server (port 2024)
#   - provisioner (optional): Sandbox provisioner (creates Pods in host Kubernetes)
#
# Prerequisites:
#   - Kubernetes cluster + kubeconfig are only required when using provisioner mode.
#
# Access: http://localhost:2026
#
# Configuration layering:
# - root `../.env` is the shared secrets file for host-run and Docker dev.
# - `config.yaml` and `backend/gateway/gateway.yaml` keep non-secret runtime config.
# - compose owns fixed in-container URLs and compose-only wiring.
# - `gateway` and `langgraph` mount the same root `.env` as `/app/.env`.

services:
  # Host path override for compose-managed services:
  # - OPENAGENTS_DOCKER_HOST_HOME: optional host path mounted from the repo machine
  #
  # The app-container runtime path stays fixed at `/openagents-home` to keep
  # the config surface smaller while still allowing a host-side override.
  # ── Shared AIO Sandbox ────────────────────────────────────────────────
  # Single-machine sandbox service managed by Docker Compose.
  # LangGraph connects through `OPENAGENTS_SANDBOX_BASE_URL` instead of
  # dynamically creating containers itself.
  sandbox-aio:
    build:
      context: .
      dockerfile: sandbox-aio/Dockerfile
      args:
        BASE_IMAGE: enterprise-public-cn-beijing.cr.volces.com/vefaas-public/all-in-one-sandbox:latest
    image: openagents-sandbox-aio:dev
    # Keep this name outside the `openagents-sandbox-*` prefix used by
    # auto-started per-thread sandboxes so `make stop` cleanup does not touch it.
    container_name: openagents-aio-sandbox
    ports:
      - "8083:8080"
    volumes:
      - ${OPENAGENTS_DOCKER_HOST_HOME:-../.openagents}:/openagents
    environment:
      # Sandbox-executed skills need the same runtime API credentials as host-run
      # Python when they call image/video generation providers from inside AIO.
      ARK_API_KEY: ${ARK_API_KEY:-}
      VOLCENGINE_API_KEY: ${VOLCENGINE_API_KEY:-}
      VOLCENGINE_IMAGE_MODEL: doubao-seedream-5.0-lite
      ARK_IMAGE_MODEL: ${ARK_IMAGE_MODEL:-}
      ARK_API_BASE_URL: ${ARK_API_BASE_URL:-}
      VOLCENGINE_API_BASE_URL: ${VOLCENGINE_API_BASE_URL:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    security_opt:
      - seccomp=unconfined
    networks:
      - openagents-dev
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/v1/sandbox"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 20s
    restart: unless-stopped

  # ── Sandbox Provisioner ────────────────────────────────────────────────
  # Manages per-sandbox Pod + Service lifecycle in the host Kubernetes
  # cluster via the K8s API.
  # Default compose development does not use any host alias.
  # Provisioner mode must be given an explicit host/IP/DNS name that gateway
  # and langgraph can use to reach provisioned sandbox NodePorts.
  provisioner:
    profiles:
      - provisioner
    build:
      context: ./provisioner
      dockerfile: Dockerfile
    container_name: openagents-provisioner
    volumes:
      - ~/.kube/config:/root/.kube/config:ro
    environment:
      K8S_NAMESPACE: ${K8S_NAMESPACE:-openagents}
      SANDBOX_IMAGE: enterprise-public-cn-beijing.cr.volces.com/vefaas-public/all-in-one-sandbox:latest
      KUBECONFIG_PATH: ${KUBECONFIG_PATH:-/root/.kube/config}
      NODE_HOST: ${NODE_HOST:-}
      K8S_API_SERVER: ${K8S_API_SERVER:-}
      # Host paths for K8s HostPath volumes (must be absolute paths accessible by the K8s node).
      # `scripts/docker.sh` resolves OPENAGENTS_DOCKER_HOST_HOME to an absolute path before compose startup.
      OPENAGENTS_HOME: ${OPENAGENTS_DOCKER_HOST_HOME:-../.openagents}
      SKILLS_HOST_PATH: ${OPENAGENTS_DOCKER_HOST_HOME:-../.openagents}/skills
      THREADS_HOST_PATH: ${OPENAGENTS_DOCKER_HOST_HOME:-../.openagents}/threads
    networks:
      - openagents-dev
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  # ── Reverse Proxy ──────────────────────────────────────────────────────
  # Routes API traffic to gateway/langgraph and (optionally) provisioner.
  nginx:
    image: nginx:alpine
    container_name: openagents-nginx
    ports:
      - "2026:2026"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - gateway
      - langgraph
    networks:
      - openagents-dev
    restart: unless-stopped

  # Frontend - Next.js Development Server
  frontend:
    build:
      context: ../
      dockerfile: frontend/app/Dockerfile
      args:
        PNPM_STORE_PATH: ${PNPM_STORE_PATH:-/root/.local/share/pnpm/store}
    container_name: openagents-frontend
    command: sh -c "cd frontend/app && pnpm run dev > /app/logs/frontend.log 2>&1"
    volumes:
      - ../frontend/app/src:/app/frontend/app/src
      - ../frontend/app/public:/app/frontend/app/public
      - ../frontend/app/next.config.js:/app/frontend/app/next.config.js:ro
      - ../logs:/app/logs
      # Mount pnpm store for caching
      - ${PNPM_STORE_PATH:-~/.local/share/pnpm/store}:/root/.local/share/pnpm/store
    working_dir: /app
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
      - CI=true
    networks:
      - openagents-dev
    restart: unless-stopped

  # Backend - Gateway API
  gateway:
    build:
      context: ../
      dockerfile: backend/gateway/Dockerfile
      cache_from:
        - type=local,src=/tmp/docker-cache-gateway
    container_name: openagents-gateway
    ports:
      - "8001:8001"
    volumes:
      - ../backend/gateway:/app/backend/gateway
      - ../.env:/app/.env:ro
      - ../config.yaml:/app/config.yaml:ro
      - ../logs:/app/logs
      - ${OPENAGENTS_DOCKER_HOST_HOME:-../.openagents}:/openagents-home
      # Mount Go cache for faster dependency installation
      - ~/.cache/go-build:/root/.cache/go-build
    working_dir: /app
    environment:
      OPENAGENTS_HOME: /openagents-home
      OPENAGENTS_CONFIG_PATH: /app/config.yaml
      OPENAGENTS_EXTENSIONS_CONFIG_PATH: /openagents-home/extensions_config.json
      LANGGRAPH_URL: http://langgraph:2024
      ONLYOFFICE_PUBLIC_APP_URL: http://gateway:8001
    networks:
      - openagents-dev
    restart: unless-stopped

  # Document Server - ONLYOFFICE Docs
  onlyoffice:
    build:
      context: .
      dockerfile: onlyoffice/Dockerfile
    image: openagents-onlyoffice:9.3.1-cjk
    container_name: openagents-onlyoffice
    ports:
      - "${ONLYOFFICE_PORT:-8082}:80"
    environment:
      JWT_ENABLED: "true"
      ONLYOFFICE_JWT_SECRET: ${ONLYOFFICE_JWT_SECRET:-}
      JWT_SECRET: ${JWT_SECRET:-}
    extra_hosts:
      # Required only when gateway runs on the host during local debug.
      # Bridge networking covers container-to-container traffic, but not
      # callbacks from ONLYOFFICE back into a host-run gateway.
      - "openagents-host:host-gateway"
    entrypoint:
      - /bin/bash
      - -lc
      - export JWT_SECRET="$${ONLYOFFICE_JWT_SECRET:-$${JWT_SECRET}}"; exec /app/ds/run-document-server.sh
    networks:
      - openagents-dev
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # Backend - LangGraph Server
  langgraph:
    build:
      context: ../
      dockerfile: backend/agents/Dockerfile
      cache_from:
        - type=local,src=/tmp/docker-cache-langgraph
    container_name: openagents-langgraph
    volumes:
      - ../backend/agents:/app/backend/agents
      - ../backend/deepagents:/app/backend/deepagents
      - ../.env:/app/.env:ro
      - ../config.yaml:/app/config.yaml
      - ../logs:/app/logs
      - ${OPENAGENTS_DOCKER_HOST_HOME:-../.openagents}:/openagents-home
      # Mount uv cache for faster dependency installation
      - ~/.cache/uv:/root/.cache/uv
    working_dir: /app
    environment:
      OPENAGENTS_HOME: /openagents-home
      OPENAGENTS_CONFIG_PATH: /app/config.yaml
      OPENAGENTS_EXTENSIONS_CONFIG_PATH: /openagents-home/extensions_config.json
      OPENAGENTS_SANDBOX_BASE_URL: http://sandbox-aio:8080
    networks:
      - openagents-dev
    restart: unless-stopped

volumes: {}

networks:
  openagents-dev:
    driver: bridge

name: openagents-dev

# OpenAgents Development Environment
# Usage: docker compose --env-file ../.env -f docker-compose-dev.yaml up --build
#
# Services:
#   - nginx: Reverse proxy (port 2026)
#   - frontend: Frontend Next.js dev server (port 3000)
#   - gateway: Backend Gateway API (port 8001)
#   - onlyoffice: ONLYOFFICE Docs server (port 8082)
#   - langgraph: LangGraph server (port 2024)
#   - provisioner (optional): Sandbox provisioner (creates Pods in host Kubernetes)
#
# Prerequisites:
#   - Kubernetes cluster + kubeconfig are only required when using provisioner mode.
#
# Access: http://localhost:2026
#
# Configuration layering:
# - `../.env` is the single source of truth.
# - `env_file` loads the shared host-view config into containers.
# - `environment` is used only for the few values whose container-view differs
#   from the host-view, such as `localhost`-based URLs and mounted runtime paths.

services:
  # Host/container path split for compose-managed services:
  # - OPENAGENTS_DOCKER_HOST_HOME: host path mounted from the repo machine
  # - OPENAGENTS_DOCKER_CONTAINER_HOME: path exposed inside app containers
  #
  # Keeping them separate makes `docker compose` usable from `docker/`
  # without requiring a pre-exported absolute OPENAGENTS_HOME.
  # ── Shared AIO Sandbox ────────────────────────────────────────────────
  # Single-machine sandbox service managed by Docker Compose.
  # LangGraph connects through `OPENAGENTS_SANDBOX_BASE_URL` instead of
  # dynamically creating containers itself.
  sandbox-aio:
    image: ${SANDBOX_AIO_IMAGE:-enterprise-public-cn-beijing.cr.volces.com/vefaas-public/all-in-one-sandbox:latest}
    container_name: openagents-sandbox-aio
    ports:
      - "127.0.0.1:${SANDBOX_AIO_PORT:-8083}:8080"
    volumes:
      - ${OPENAGENTS_DOCKER_HOST_HOME:-../.openagents}:/openagents
    security_opt:
      - seccomp=unconfined
    networks:
      - openagents-dev
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/v1/sandbox"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 20s
    restart: unless-stopped

  # ── Sandbox Provisioner ────────────────────────────────────────────────
  # Manages per-sandbox Pod + Service lifecycle in the host Kubernetes
  # cluster via the K8s API.
  # Backend accesses sandboxes directly via host.docker.internal:{NodePort}.
  provisioner:
    profiles:
      - provisioner
    build:
      context: ./provisioner
      dockerfile: Dockerfile
    container_name: openagents-provisioner
    volumes:
      - ~/.kube/config:/root/.kube/config:ro
    env_file:
      - ../.env
    environment:
      K8S_NAMESPACE: ${K8S_NAMESPACE_DOCKER:-openagents}
      SANDBOX_IMAGE: ${SANDBOX_IMAGE_DOCKER}
      KUBECONFIG_PATH: ${KUBECONFIG_PATH_DOCKER:-/root/.kube/config}
      NODE_HOST: ${NODE_HOST_DOCKER:-host.docker.internal}
      K8S_API_SERVER: ${K8S_API_SERVER_DOCKER:-https://host.docker.internal:26443}
      # Host paths for K8s HostPath volumes (must be absolute paths accessible by the K8s node).
      # `scripts/docker.sh` resolves OPENAGENTS_DOCKER_HOST_HOME to an absolute path before compose startup.
      OPENAGENTS_HOME: ${OPENAGENTS_DOCKER_HOST_HOME:-../.openagents}
      SKILLS_HOST_PATH: ${OPENAGENTS_DOCKER_HOST_HOME:-../.openagents}/skills
      THREADS_HOST_PATH: ${OPENAGENTS_DOCKER_HOST_HOME:-../.openagents}/threads
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - openagents-dev
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  # ── Reverse Proxy ──────────────────────────────────────────────────────
  # Routes API traffic to gateway/langgraph and (optionally) provisioner.
  # Select nginx config via NGINX_CONF:
  # - nginx.local.conf (default): no provisioner route (local/aio modes)
  # - nginx.conf: includes provisioner route (provisioner mode)
  nginx:
    image: nginx:alpine
    container_name: openagents-nginx
    ports:
      - "2026:2026"
    volumes:
      - ./nginx/${NGINX_CONF:-nginx.conf}:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - gateway
      - langgraph
    networks:
      - openagents-dev
    restart: unless-stopped

  # Frontend - Next.js Development Server
  frontend:
    build:
      context: ../
      dockerfile: frontend/app/Dockerfile
      args:
        PNPM_STORE_PATH: ${PNPM_STORE_PATH:-/root/.local/share/pnpm/store}
    container_name: openagents-frontend
    command: sh -c "cd frontend/app && pnpm run dev > /app/logs/frontend.log 2>&1"
    volumes:
      - ../frontend/app/src:/app/frontend/app/src
      - ../frontend/app/public:/app/frontend/app/public
      - ../frontend/app/next.config.js:/app/frontend/app/next.config.js:ro
      - ../logs:/app/logs
      # Mount pnpm store for caching
      - ${PNPM_STORE_PATH:-~/.local/share/pnpm/store}:/root/.local/share/pnpm/store
    working_dir: /app
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
      - CI=true
    env_file:
      - ../frontend/app/.env
    networks:
      - openagents-dev
    restart: unless-stopped

  # Backend - Gateway API
  gateway:
    build:
      context: ../
      dockerfile: backend/gateway/Dockerfile
      cache_from:
        - type=local,src=/tmp/docker-cache-gateway
    container_name: openagents-gateway
    ports:
      - "127.0.0.1:8001:8001"
    volumes:
      - ../backend/gateway:/app/backend/gateway
      - ../.env:/app/.env:ro
      - ../logs:/app/logs
      - ${OPENAGENTS_DOCKER_HOST_HOME:-../.openagents}:${OPENAGENTS_DOCKER_CONTAINER_HOME:-/openagents-home}
      # Mount Go cache for faster dependency installation
      - ~/.cache/go-build:/root/.cache/go-build
    working_dir: /app
    environment:
      # Gateway loads `/app/.env` itself; only override container-view values here.
      DATABASE_URI: ${DATABASE_URI_DOCKER}
      OPENAGENTS_HOME: ${OPENAGENTS_HOME_DOCKER:-/openagents-home}
      LANGGRAPH_URL: ${LANGGRAPH_URL_DOCKER}
      ONLYOFFICE_PUBLIC_APP_URL: ${ONLYOFFICE_PUBLIC_APP_URL_DOCKER}
    extra_hosts:
      # For Linux: map host.docker.internal to host gateway
      - "host.docker.internal:host-gateway"
    networks:
      - openagents-dev
    restart: unless-stopped

  # Document Server - ONLYOFFICE Docs
  onlyoffice:
    build:
      context: .
      dockerfile: onlyoffice/Dockerfile
    image: openagents-onlyoffice:9.3.1-cjk
    container_name: openagents-onlyoffice
    ports:
      - "127.0.0.1:${ONLYOFFICE_PORT:-8082}:80"
    env_file:
      - ../.env
    environment:
      - JWT_ENABLED=true
    entrypoint:
      - /bin/bash
      - -lc
      - export JWT_SECRET="$${ONLYOFFICE_JWT_SECRET}"; exec /app/ds/run-document-server.sh
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - openagents-dev
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # Backend - LangGraph Server
  langgraph:
    build:
      context: ../
      dockerfile: backend/agents/Dockerfile
      cache_from:
        - type=local,src=/tmp/docker-cache-langgraph
    container_name: openagents-langgraph
    volumes:
      - ../backend/agents:/app/backend/agents
      - ../backend/deepagents:/app/backend/deepagents
      - ../.env:/app/.env:ro
      - ../config.yaml:/app/config.yaml
      - ../logs:/app/logs
      - ${OPENAGENTS_DOCKER_HOST_HOME:-../.openagents}:${OPENAGENTS_DOCKER_CONTAINER_HOME:-/openagents-home}
      # Mount uv cache for faster dependency installation
      - ~/.cache/uv:/root/.cache/uv
    working_dir: /app
    environment:
      # LangGraph loads `/app/.env` through `langgraph.json`; only override
      # values that must differ inside Docker.
      DATABASE_URI: ${DATABASE_URI_DOCKER}
      OPENAGENTS_HOME: ${OPENAGENTS_HOME_DOCKER:-/openagents-home}
      OPENAGENTS_SANDBOX_BASE_URL: ${OPENAGENTS_SANDBOX_BASE_URL_DOCKER:-http://sandbox-aio:8080}
      OPENAGENTS_SANDBOX_SHARED_DATA_MOUNT_PATH: ${OPENAGENTS_SANDBOX_SHARED_DATA_MOUNT_PATH_DOCKER:-/openagents}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - openagents-dev
    restart: unless-stopped

volumes: {}

networks:
  openagents-dev:
    driver: bridge

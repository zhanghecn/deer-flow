# Gateway configuration

server:
  port: 8001
  host: 0.0.0.0

database:
  host: $DB_HOST
  port: $DB_PORT
  user: $DB_USER
  password: $DB_PASSWORD
  dbname: $DB_NAME
  sslmode: $DB_SSLMODE

jwt:
  secret: $JWT_SECRET
  expire_hour: 72

storage:
  base_dir: .openagents

logging:
  level: info
  access_log: true
  # Enable detailed proxy logs for troubleshooting 502/timeout/upstream issues.
  proxy_debug: false
  # Only enable in local debugging; may expose sensitive headers.
  proxy_log_headers: false

# Declarative proxy routes
# Add new upstream services here — no code changes needed.
# Supports: HTTP, SSE/streaming, WebSocket (auto-detected via Upgrade header)
proxy:
  routes:
    - prefix: /api/langgraph
      upstream: http://localhost:2024
      strip_prefix: true
      auth: jwt
      inject_body:
        configurable.user_id: "{{.UserID}}"

name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to make OpenPencil better? We'd love to hear it!

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? What's the pain point?
      placeholder: I'm always frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe your ideal solution.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or workarounds you've considered.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Canvas / Drawing
        - AI / Generation
        - MCP Server
        - Design System / Variables
        - Code Generation
        - Electron / Desktop
        - Figma Import
        - UI / Panels
        - Other

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Mockups, screenshots, references, or any other context.

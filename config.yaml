# OpenAgents local runtime config
#
# This file keeps your local/dev model settings. In cloud / gateway runtime,
# model config can also come from PostgreSQL or per-request injection.

models: []

runtime:
  edition: inmem
  jobs_per_worker: 4

sandbox:
  use: src.community.aio_sandbox:AioSandboxProvider
  # Host-run local development talks to the compose-managed sandbox on 18080,
  # while in-compose LangGraph still uses the internal `sandbox-aio:8080` URL.
  base_url: http://127.0.0.1:18080
  shared_data_mount_path: /openagents
  auto_start: false

storage:
  base_dir: .openagents

# Filesystem tools are provided by deepagents' FilesystemMiddleware and do not
# need to be declared here.
tool_groups:
  - name: web

tools:
  - name: web_search
    group: web
    use: src.community.opencode_web.tools:web_search_tool
    # Exa stays primary for quality; Brave/Bing keep the tool usable when the
    # primary backend is rate-limited or unavailable.
    providers:
      - exa
      - brave
      - bing
    num_results: 8
    search_type: auto
    livecrawl: fallback
    timeout: 25

  - name: web_fetch
    group: web
    use: src.community.opencode_web.tools:web_fetch_tool
    timeout: 30

  - name: image_search
    group: web
    use: src.community.image_search.tools:image_search_tool
    max_results: 5

skills:
  path: .openagents
  container_path: /mnt/skills

title:
  enabled: true
  max_words: 6
  max_chars: 60
  model_name: null

summarization:
  enabled: true
  model_name: null
  trigger:
    - type: fraction
      value: 0.95
  keep:
    type: messages
    value: 12
  trim_tokens_to_summarize: 8000
  summary_prompt: null

# Memory is configured per agent, not in this root config file.
